site_name: Perfect Closure
site_description: "It is all light; light that has closure becomes mass."
site_author: John Van Geem / RQM Technologies
repo_url: https://github.com/RQM-Technologies-dev/perfect-closure

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.annotate

nav:
  - Home: index.md
  - Perfect Closure: perfect-closure.md
  - Light-Mass Thesis: light-mass-thesis.md
  - Free Light vs Closed Light: free-light-vs-closed-light.md
  - Quaternionic Standing Waves: quaternionic-standing-waves.md
  - Hydrogen Closure Bridge: hydrogen-closure-bridge.md
  - Claim Boundaries: claim-boundaries.md
  - Archived Zeta Program: archive-zeta-critical-line-program.md
  - Glossary: glossary.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

docs_dir: docs
